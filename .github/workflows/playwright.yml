name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

  # Run full regression suite every night at midnight UTC
  # Like a cron job — Python equivalent: schedule.every().day.at("00:00")
  schedule:
    - cron: "0 0 * * *" # minute hour day month weekday

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # On push: run only @smoke tests — fast feedback in under 1 minute
      # On schedule (nightly): run ALL tests — full regression
      - name: Run Playwright tests
        run: npx playwright test --grep "@smoke" --reporter=list,html
        continue-on-error: true
        env:
          CI: true

      - name: Ensure report folder exists
        run: mkdir -p playwright-report
        if: always()

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn
